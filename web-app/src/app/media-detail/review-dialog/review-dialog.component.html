<h2 mat-dialog-title>{{ data.existingReview ? 'Edit Review' : 'Write a Review' }}</h2>
<mat-dialog-content>
  <div class="star-selector">
    <label>Rating</label>
    <div class="stars">
      @for (star of stars; track star) {
        <mat-icon
          class="star-btn"
          [class.filled]="star <= (hoverRating() || rating())"
          (mouseenter)="hoverRating.set(star)"
          (mouseleave)="hoverRating.set(0)"
          (click)="setRating(star)">
          {{ star <= (hoverRating() || rating()) ? 'star' : 'star_border' }}
        </mat-icon>
      }
    </div>
  </div>
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Your review (optional)</mat-label>
    <textarea matInput rows="4" [value]="reviewText()" (input)="reviewText.set($any($event.target).value)"></textarea>
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="rating() < 1">Submit</button>
</mat-dialog-actions>
